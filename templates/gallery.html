{% extends "base.html" %}

{% block title %}
Gallery
{% endblock title %}

{% block hero %}

<div style="
position:relative;
z-index:2;
padding:80px 20px;
margin-top:80px;
">

<div style="
max-width:1200px;
margin:auto;
padding:30px;
background:rgba(0,0,0,0.7);
border-radius:12px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.6);
">

<h2 style="
text-align:center;
color:white;
margin-bottom:40px;
font-size:40px;
font-weight:bold;
letter-spacing:1px;
">
Gallery
</h2>

<div class="row">

{% for post in posts %}

<div class="col-md-4 mb-4">
    <div class="card gallery-card">

        <div class="img-wrapper">
            <img src="{{ post.img.url }}" class="gallery-img" alt="">
        </div>

        <div class="card-body">
            <h5 class="card-title">{{ post.title }}</h5>
            <p class="card-text">Uploaded: {{ post.timeStamp }}</p>
        </div>

    </div>
</div>

{% endfor %}

</div>

</div>
</div>

<style>

/* Card */
.gallery-card {
    border: none;
    border-radius: 15px;
    overflow: hidden;
    background: #111;
    color: white;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* Hover Effect */
.gallery-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 30px rgba(255, 165, 0, 0.4);
}

.img-wrapper {
    width: 100%;
    height: 250px;
    background: black;
    overflow: hidden;
    border-radius: 12px;
}

/* Image full width + proper fit */
.gallery-img {
    width: 100%;
    height: 100%;
    object-fit: cover;   /* fills properly */
    object-position: center; /* center crop */
    transition: transform 0.4s ease;
}

/* Zoom on Hover */
.gallery-card:hover .gallery-img {
    transform: scale(1.1);
}

/* Text */
.card-body {
    text-align: center;
    padding: 15px;
}

.card-title {
    font-size: 18px;
    margin-bottom: 5px;
}

.card-text {
    font-size: 14px;
    color: #ccc;
}

</style>

{% endblock hero %}
