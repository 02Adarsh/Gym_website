{% extends "base.html" %}

{% block title %}
Enrollment for Gym
{% endblock title %}

{% block hero %}
<div style="display:flex; justify-content:center; align-items:center; min-height:80vh;">

<form method="POST" action="/join" style="
width:420px;
padding:30px;
background:rgba(0,0,0,0.65);
border-radius:12px;
backdrop-filter:blur(8px);
box-shadow:0 10px 30px rgba(0,0,0,0.6);
z-index: 2;
">

{% csrf_token %}

<h2 style="text-align:center; color:white; margin-bottom:25px;">Join GYM</h2>
{% if messages %}
    {% for message in messages %}
        <div style="
            padding:10px;
            margin-bottom:15px;
            background:lightgreen;
            color:black;
            border-radius:6px;
            text-align:center;
        ">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<div class="mb-3">
<label style="color:white;">Username</label>
<input type="text" name="FullName" class="form-control" placeholder="Enter Your Name" required>
</div>

<div class="mb-3">
<label style="color:white;">Email</label>
<input type="email" name="Email" value="{{user.email}}"class="form-control" placeholder="Enter Your Email" readonly required>
</div>

<div class="mb-3">
<label style="color:white;">Phone Number</label>
<input type="number" name="PhoneNumber" class="form-control" placeholder="Enter Your Number" required>
</div>

<div class="mb-3">
    <label style="color:white;">Gender</label>
    <select name="Gender" class="form-control" required>
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
    </select>
</div>

<div class="mb-3">
<label style="color:white;">DOB</label>
<input type="date" name="Dob" class="form-control" placeholder="Date of Birth" required>
</div>

<div class="mb-3">
    <label style="color:white;">Membership</label>
    <select name="SelectMembershipplan" class="form-control" required>
        <option value="">Select Membership Plan</option>

        {% for p in Membership %}
            <option value="{{p.plan}} - {{p.price}}">{{p.plan}}-{{p.price}} Rs</option>
        {% endfor %}

    </select>
</div>

<div class="mb-3">
    <label style="color:white;">Trainer</label>
    <select name="SelectTrainer" class="form-control" required>
        <option value="">Select Trainer</option>

        {% for p in SelectTrainer %}
            <option value="{{p.name}}">{{p.name}}</option>
        {% endfor %}

    </select>
</div>

<div class="mb-3">
<label style="color:white;">Reference</label>
<input type="text" name="Reference" class="form-control" placeholder="Refered By" required>
</div>

<div class="mb-3">
<label style="color:white;">Address</label>
<input type="text" name="Address" class="form-control" placeholder="Address" required>
</div>



<button type="submit" class="btn btn-warning w-100" style="font-weight:600;">
Enroll
</button>



</form>

</div>
{% endblock hero %}

{% block body %}
{% endblock body %}
