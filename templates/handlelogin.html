{% extends "base.html" %}

{% block title %}
login
{% endblock title %}

{% block hero %}
<div style="display:flex; justify-content:center; align-items:center; min-height:80vh;">

<form method="POST" action="/handlelogin" style="
width:420px;
padding:30px;
background:rgba(0,0,0,0.65);
border-radius:12px;
backdrop-filter:blur(8px);
box-shadow:0 10px 30px rgba(0,0,0,0.6);
z-index: 2;
">

{% csrf_token %}

<h2 style="text-align:center; color:white; margin-bottom:25px;">Login</h2>
{% if messages %}
    {% for message in messages %}
        <div style="
            padding:10px;
            margin-bottom:15px;
            background:lightgreen;
            color:black;
            border-radius:6px;
            text-align:center;
        ">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}


<div class="mb-3">
<label style="color:white;">Username</label>
<input type="text" name="username" class="form-control" placeholder="Enter username" required>
</div>

<div class="mb-3">
<label style="color:white;">Password</label>
<input type="password" name="pass1" class="form-control" placeholder="Enter password" required>
</div>

<button type="submit" class="btn btn-warning w-100" style="font-weight:600;">
Login
</button>

<p style="text-align:center; color:lightgray; margin-top:15px;">
Dont have an account? <a href="/signup" style="color:#ffc107;">Signup</a>
</p>

</form>

</div>
{% endblock hero %}

{% block body %}
{% endblock body %}
